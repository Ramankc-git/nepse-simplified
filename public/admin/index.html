<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Content Manager — NEPSE SIMPLIFIED</title>
  <style>
    /* Prevent FOUC — minimal loading indicator */
    #cms-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #0a2141;
      background: #f8fafc;
    }
    #cms-loading .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #0a2141;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Shown until Decap CMS mounts -->
  <div id="cms-loading">
    <div class="spinner"></div>
    <span>Loading CMS…</span>
  </div>

  <!-- 1. Netlify Identity Widget — MUST load first, synchronously -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- 2. Handle invite tokens & login flow -->
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          // After successful login/invite acceptance, redirect to clean URL
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>

  <!-- 3. Decap CMS — loads after Identity Widget is ready -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
