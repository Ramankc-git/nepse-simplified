backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

locale: "en"

collections:
  # ===================== NEWSLETTERS =====================
  - name: "newsletters"
    label: "Weekly Newsletters"
    folder: "content/newsletters"
    create: true
    slug: "{{slug}}"
    summary: "{{volume}} — {{dateRange}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Volume", name: "volume", widget: "string", default: "Vol. XXX" }
      - { label: "Date Range", name: "dateRange", widget: "string" }
      - { label: "As of Date", name: "asOfDate", widget: "string" }
      - { label: "Status", name: "status", widget: "select", options: ["published", "draft"], default: "draft" }

      # --- Section 1: Market Snapshot ---
      - label: "Market Snapshot"
        name: "marketSnapshot"
        widget: "object"
        fields:
          - { label: "Index Closing", name: "indexClosing", widget: "string" }
          - { label: "Index Previous", name: "indexPrevious", widget: "string" }
          - { label: "Index Change %", name: "indexChange", widget: "string" }
          - { label: "Index Change Points", name: "indexChangePoints", widget: "string" }
          - { label: "Index Positive", name: "indexPositive", widget: "boolean", default: true }
          - { label: "Turnover This Week", name: "turnoverThisWeek", widget: "string" }
          - { label: "Turnover Previous Week", name: "turnoverPrevWeek", widget: "string" }
          - { label: "Turnover Change %", name: "turnoverChange", widget: "string" }
          - { label: "Turnover Positive", name: "turnoverPositive", widget: "boolean", default: false }
          - { label: "Top Sector Name", name: "topSectorName", widget: "string" }
          - { label: "Top Sector Change", name: "topSectorChange", widget: "string" }
          - { label: "Second Sector Name", name: "secondSectorName", widget: "string" }
          - { label: "Second Sector Change", name: "secondSectorChange", widget: "string" }
          - { label: "Laggard Sector", name: "laggardSector", widget: "string" }
          - { label: "Market Context", name: "marketContext", widget: "text" }

      # --- Section 2: PESTLE Analysis ---
      - label: "Opportunities"
        name: "opportunities"
        widget: "list"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Takeaway", name: "takeaway", widget: "string" }

      - label: "Risks"
        name: "risks"
        widget: "list"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Takeaway", name: "takeaway", widget: "string" }

      - label: "Strategic Focus"
        name: "strategicFocus"
        widget: "list"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Takeaway", name: "takeaway", widget: "string" }

      # --- Section 3: Watchlist ---
      - label: "Watchlist Stocks"
        name: "stocks"
        widget: "list"
        fields:
          - { label: "Symbol", name: "symbol", widget: "string" }
          - { label: "Badge Label", name: "badge", widget: "string" }
          - { label: "Badge Color", name: "badgeColor", widget: "select", options: ["green", "blue", "orange"] }
          - { label: "Reasoning", name: "reasoning", widget: "text" }
          - { label: "Tip", name: "tip", widget: "string" }

      # --- Section 4: Upcoming Events ---
      - label: "IPOs & Auctions"
        name: "iposAndAuctions"
        widget: "list"
        field: { label: "Event", name: "event", widget: "string" }

      - label: "Policy Notices"
        name: "policyNotices"
        widget: "list"
        field: { label: "Notice", name: "notice", widget: "string" }

      # --- Section 5: Company Analysis ---
      - label: "Company Analysis"
        name: "companyAnalysis"
        widget: "object"
        fields:
          - { label: "Company Name", name: "companyName", widget: "string" }
          - { label: "LTP", name: "ltp", widget: "string" }
          - { label: "Weekly High", name: "weeklyHigh", widget: "string" }
          - { label: "Trend", name: "trend", widget: "select", options: ["Accumulating", "Breakout", "Distributing", "Consolidating", "Rallying", "Correcting"] }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Strategic Opinion", name: "strategicOpinion", widget: "text" }
          - { label: "Support Zone", name: "supportZone", widget: "string" }
          - { label: "Resistance", name: "resistance", widget: "string" }
          - { label: "Institutional Demand", name: "institutionalDemand", widget: "select", options: ["Very High", "High", "Moderate", "Low"] }
          - { label: "Market Float", name: "marketFloat", widget: "select", options: ["Limited", "Moderate", "High"] }

      # --- Section 6: Learners Insight ---
      - label: "Insights"
        name: "insights"
        widget: "list"
        fields:
          - { label: "Category", name: "category", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }

      # --- Section 7: Summary ---
      - { label: "Summary Text", name: "summaryText", widget: "text" }

  # ===================== ANALYSIS ARTICLES =====================
  - name: "analysis"
    label: "Analysis Articles"
    folder: "content/analysis"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["company", "sector"] }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Read Time", name: "readTime", widget: "string", default: "8 min read" }
      - { label: "Tags", name: "tags", widget: "list", field: { label: "Tag", name: "tag", widget: "string" } }
      - { label: "Status", name: "status", widget: "select", options: ["published", "draft"], default: "draft" }
      - { label: "Body Content", name: "body", widget: "markdown" }

  # ===================== LEARNING ARTICLES =====================
  - name: "learning"
    label: "Learning Articles"
    folder: "content/learning"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Fundamentals", "Valuation", "Technical Analysis", "IPO", "Market Psychology"] }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Read Time", name: "readTime", widget: "string", default: "8 min read" }
      - { label: "Tags", name: "tags", widget: "list", field: { label: "Tag", name: "tag", widget: "string" } }
      - { label: "Status", name: "status", widget: "select", options: ["published", "draft"], default: "draft" }
      - { label: "Body Content", name: "body", widget: "markdown" }

  # ===================== MARKET EVENTS =====================
  - name: "events"
    label: "Market Events"
    folder: "content/events"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Event Title", name: "title", widget: "string" }
      - { label: "Type", name: "type", widget: "select", options: ["ipo", "right-share", "auction", "dividend", "agm", "policy"] }
      - { label: "Company", name: "company", widget: "string" }
      - { label: "Start Date", name: "startDate", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "End Date", name: "endDate", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Status", name: "status", widget: "select", options: ["upcoming", "open", "closed"] }
      - { label: "Details", name: "details", widget: "text" }
