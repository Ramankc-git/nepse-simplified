[build]
  command = "npm run build"
  publish = ".next"

# Global security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://api.buttondown.email; connect-src 'self' https://api.buttondown.email;"

# Cache control for dynamic content sections
[[headers]]
  for = "/analysis/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/newsletters/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Admin/CMS - allow same-origin framing for Netlify Identity widget
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Robots-Tag = "noindex, nofollow"

# API routes - no indexing
[[headers]]
  for = "/api/*"
  [headers.values]
    Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"

# Netlify Identity - required for Decap CMS git-gateway backend
[[redirects]]
  from = "/cms"
  to = "/admin/"
  status = 200
